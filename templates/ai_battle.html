<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋 - 人机对战</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">中国象棋</div>
        <div class="nav-links">
            <a href="/" class="nav-link">本地双人</a>
            <a href="/ai" class="nav-link active">人机对战</a>
            <a href="/lobby" class="nav-link">联机大厅</a>
            <a href="/login" id="navLoginLink" class="nav-link">登录</a>
            <div id="navUserInfo" class="nav-user-info" style="display:none;">
                <span class="nav-username">你好，<span id="navUsername"></span></span>
                <button id="navLogoutBtn" class="nav-logout-btn">退出</button>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1>人机对战</h1>
        <div class="game-info">
            <div class="turn-indicator">
                当前回合：<span id="currentTurn" class="turn-red">红方</span>
            </div>
            <div class="difficulty-selector">
                <label for="difficultySelect" class="difficulty-label">难度</label>
                <select id="difficultySelect" class="difficulty-select">
                    <option value="easy">简单</option>
                    <option value="normal" selected>普通</option>
                    <option value="hard">困难</option>
                </select>
            </div>
        </div>

        <div id="aiThinking" class="ai-thinking" style="display:none;">
            <span class="thinking-dot"></span>
            <span id="thinkingText">AI 思考中…</span>
        </div>

        <div class="last-move-info" id="lastMoveInfo" style="display:none;">
            <span class="last-move-player">你：<span id="lastPlayerMove">—</span></span>
            <span class="last-move-ai">AI：<span id="lastAiMove">—</span></span>
        </div>

        <div class="board-wrapper">
            <div id="boardContainer" class="board-container">
                <img id="boardImage" src="/static/assets/pieces/chessboard.png" alt="中国象棋棋盘" class="board-image">
                <div id="piecesLayer" class="pieces-layer"></div>
                <div id="clickAreas" class="click-areas"></div>
            </div>
        </div>

        <div class="toolbar">
            <button id="resetBtn" class="action-btn">重新开始</button>
            <button id="flipBtn" class="action-btn" title="翻转棋盘">翻转</button>
            <button id="undoBtn" class="action-btn" title="悔棋">悔棋</button>
            <button id="drawBtn" class="action-btn" title="求和">求和</button>
            <button id="resignBtn" class="action-btn danger" title="认输">认输</button>
            
            <div class="toolbar-divider"></div>
            
            <button id="analyzeBtn" class="action-btn" title="AI分析当前局面">提示</button>
            <button id="reviewBtn" class="action-btn" title="复盘分析">复盘</button>
            <button id="replayBtn" class="action-btn" title="回顾走棋">回顾</button>
            <button id="deduceBtn" class="action-btn" title="在当前局势推演走子（不影响真实棋盘）">推演</button>
        </div>

        <div class="history-section">
            <div class="history-header" id="historyToggle">
                走棋记录 <span id="historyArrow">&#9660;</span>
            </div>
            <div id="historyList" class="history-list" style="display:none;"></div>
        </div>

        <div id="message" class="message"></div>

        <div id="analyzePanel" class="analyze-panel" style="display:none;">
            <div class="analyze-header">
                <span>AI 分析</span>
                <button id="closeAnalyzeBtn" class="close-btn">×</button>
            </div>
            <div class="analyze-content">
                <div id="analyzeLoading" class="analyze-loading">分析中…</div>
                <div id="analyzeResult" class="analyze-result" style="display:none;">
                    <div class="analyze-recommendation">
                        <span class="analyze-label">推荐走法：</span>
                        <span id="analyzeDesc" class="analyze-desc"></span>
                    </div>
                    <div class="analyze-evaluation">
                        <span class="analyze-label">局面评估：</span>
                        <span id="analyzeScore" class="analyze-score"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="reviewPanel" class="review-panel" style="display:none;">
            <div class="review-header">
                <span>复盘分析</span>
                <button id="closeReviewBtn" class="close-btn">×</button>
            </div>
            <div class="review-content">
                <div id="reviewLoading" class="review-loading">分析中…</div>
                <div id="reviewResult" class="review-result" style="display:none;">
                    <div id="reviewList" class="review-list"></div>
                </div>
            </div>
        </div>

        <div id="replayPanel" class="replay-panel" style="display:none;">
            <div class="replay-header">
                <span>走棋回顾</span>
                <button id="closeReplayBtn" class="close-btn">×</button>
            </div>
            <div class="replay-content">
                <div class="replay-controls">
                    <button id="replayFirstBtn" class="replay-btn">⏮</button>
                    <button id="replayPrevBtn" class="replay-btn">⏪</button>
                    <span id="replayPosition" class="replay-position">1 / 1</span>
                    <button id="replayNextBtn" class="replay-btn">⏩</button>
                    <button id="replayLastBtn" class="replay-btn">⏭</button>
                </div>
                <div id="replayList" class="replay-list"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/ai_game.js"></script>
</body>
</html>
