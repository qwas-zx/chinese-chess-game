<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋 - 联机对战</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/assets/other/favicon.ico" type="image/x-icon">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">中国象棋</div>
        <div class="nav-links">
            <a href="/" class="nav-link">本地双人</a>
            <a href="/ai" class="nav-link">人机对战</a>
            <a href="/lobby" class="nav-link">联机大厅</a>
            <a href="/login" id="navLoginLink" class="nav-link">登录</a>
            <div id="navUserInfo" class="nav-user-info" style="display:none;">
                <span class="nav-username">你好，<span id="navUsername"></span></span>
                <button id="navLogoutBtn" class="nav-logout-btn">退出</button>
            </div>
            <span id="pendingIndicator" class="pending-dot" style="display:none;">同步中…</span>
        </div>
    </nav>
    <div class="container">
        <h1>中国象棋 · 联机</h1>
        <div id="roomInfo" class="room-info">正在同步房间…</div>

        <div class="game-info">
            <div class="turn-indicator">
                当前回合：<span id="currentTurn" class="turn-red">红方</span>
            </div>
        </div>

        <div id="drawBanner" class="draw-banner" style="display:none;">
            <span id="drawBannerText"></span>
            <button id="acceptDrawBtn" class="action-btn small success">同意</button>
            <button id="declineDrawBtn" class="action-btn small danger">拒绝</button>
        </div>

        <div class="board-wrapper">
            <div id="boardContainer" class="board-container">
                <img id="boardImage" src="/static/assets/pieces/chessboard.png" alt="中国象棋棋盘" class="board-image">
                <div id="piecesLayer" class="pieces-layer"></div>
                <div id="clickAreas" class="click-areas"></div>
            </div>
        </div>

        <div class="toolbar">
            <button id="flipBtn" class="action-btn" title="翻转棋盘">翻转</button>
            <button id="drawBtn" class="action-btn" title="求和">求和</button>
            <button id="resignBtn" class="action-btn danger" title="认输">认输</button>
            <button id="leaveBtn" class="action-btn danger" title="离开房间">离开房间</button>
            
            <div class="toolbar-divider"></div>
            
            <button id="replayBtn" class="action-btn" title="回顾走棋">回顾</button>
            <button id="chatBtn" class="action-btn" title="聊天">聊天</button>
            <button id="deduceBtn" class="action-btn" title="在当前局势推演走子（仅自己可见，不影响真实棋盘）">推演</button>
        </div>

        <div class="history-section">
            <div class="history-header" id="historyToggle">
                走棋记录 <span id="historyArrow">&#9660;</span>
            </div>
            <div id="historyList" class="history-list" style="display:none;"></div>
        </div>

        <div id="message" class="message"></div>

        <div id="chatPanel" class="chat-panel" style="display:none;">
            <div class="chat-header">
                <span>聊天</span>
                <button id="closeChatBtn" class="close-btn">×</button>
            </div>
            <div class="chat-content">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="输入消息…" maxlength="200">
                    <button id="sendChatBtn" class="chat-send-btn">发送</button>
                </div>
            </div>
        </div>

        <div id="replayPanel" class="replay-panel" style="display:none;">
            <div class="replay-header">
                <span>走棋回顾</span>
                <button id="closeReplayBtn" class="close-btn">×</button>
            </div>
            <div class="replay-content">
                <div class="replay-controls">
                    <button id="replayFirstBtn" class="replay-btn">⏮</button>
                    <button id="replayPrevBtn" class="replay-btn">⏪</button>
                    <span id="replayPosition" class="replay-position">1 / 1</span>
                    <button id="replayNextBtn" class="replay-btn">⏩</button>
                    <button id="replayLastBtn" class="replay-btn">⏭</button>
                </div>
                <div id="replayList" class="replay-list"></div>
            </div>
        </div>
    </div>

    <!-- Socket.IO client (local copy — flask-socketio 5.x no longer serves /socket.io/socket.io.js correctly) -->
    <script src="/static/js/socket.io.min.js"></script>
    <script type="module" src="/static/js/modules/online.js"></script>
</body>
</html>
